name: gitleaks

# Secret-scan every push/PR. Belt-and-suspenders on top of GitHub's native
# secret scanning + push protection: this repo is public and holds only skill
# docs + example frames, so a leak should be impossible — this catches a bad
# hand-edit before it merges. Uses the OSS gitleaks image (no license needed;
# the gitleaks *action* requires a paid license for org repos).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (OSS image)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --no-git --redact --verbose
